<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Elegoo CC2 Pro Control</title>
    <style>
        :root { --bg: #0f111a; --card: #1a1d2b; --accent: #3b82f6; --green: #10b981; --red: #ef4444; --purple: #8b5cf6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
        .value { font-size: 28px; font-weight: 800; color: var(--accent); }
        
        .progress-bar { height: 12px; background: #2d3142; border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); width: 0%; transition: width 1s; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #333; font-size: 13px; }
        .btn { padding: 8px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; color: white; font-size: 12px; }
        .btn-green { background: var(--green); } .btn-blue { background: #2563eb; }
        input[type="number"], select { background: #2d3142; border: 1px solid #444; color: white; border-radius: 4px; padding: 4px; }
        
        .upload-section { background: rgba(59, 130, 246, 0.1); border: 2px dashed var(--accent); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 30px; }
        
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; background: #2d3142; margin-top: 10px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .small-info { font-size: 12px; color: #94a3b8; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #log { margin-top: 30px; font-family: 'Consolas', monospace; font-size: 10px; background: #000; padding: 15px; height: 250px; overflow-y: auto; color: #10b981; border-radius: 8px; border: 1px solid #333; line-height: 1.4; }
    </style>
</head>
<body>
    <h1 style="margin-top:0; font-size: 24px;">ELEGOO <span style="color:var(--accent)">CC2</span> Pro Dashboard</h1>


    <div class="grid">
        <div class="card">
            <div class="label">Status</div>
            <div id="state" class="value">Warte...</div>
            <div id="cur-filename" class="small-info">Kein Job</div>
            <div id="filament-info" class="badge" style="display:none;"><span id="filament-dot" class="dot"></span><span id="filament-text"></span></div>
            <div id="job-controls" style="margin-top:15px; display:none; gap:10px; flex-wrap:wrap;">
                <button id="btn-pause" class="btn btn-blue" onclick="window.electronAPI.pausePrint()">Pause</button>
                <button id="btn-resume" class="btn btn-green" onclick="window.electronAPI.resumePrint()">Fortsetzen</button>
                <button class="btn" style="background:var(--red)" onclick="window.electronAPI.cancelPrint()">Abbrechen</button>
            </div>
        </div>
        <div class="card"><div class="label">Nozzle</div><div id="nozzle" class="value">--° / --°</div>
            <div style="margin-top:10px"><input type="number" id="t-nozzle" style="width:50px"> <button class="btn btn-blue" onclick="applyTemp('extruder','t-nozzle')">Set</button></div>
        </div>
        <div class="card"><div class="label">Bed</div><div id="bed" class="value">--° / --°</div>
            <div style="margin-top:10px"><input type="number" id="t-bed" style="width:50px"> <button class="btn btn-blue" onclick="applyTemp('heater_bed','t-bed')">Set</button></div>
        </div>
        <div class="card"><div class="label">Progress</div><div id="percent" class="value">0%</div><div id="time-left" class="small-info">--:-- verbleibend</div><div class="progress-bar"><div id="fill" class="progress-fill"></div></div></div>
    </div>

    <div class="upload-section">
        <h3 style="margin-top:0">Upload & Print</h3>
        <div style="margin-bottom:15px">
            <label style="font-size:12px; color:#94a3b8">Filament Slot: </label>
            <select id="upload-slot" style="margin-right:10px"></select>
            <button class="btn btn-blue" onclick="handleUpload()">GCode Datei wählen...</button>
        </div>
        <div id="upload-status" style="margin-top:10px; font-size: 13px; color: #94a3b8;">Bereit</div>
    </div>

    <div class="card" style="margin-top:30px">
        <div style="display:flex; justify-content:space-between; align-items:center"><div class="label" style="margin:0">Files on Printer</div><button class="btn btn-blue" onclick="window.electronAPI.requestFiles()">Refresh</button></div>
        <table><thead><tr><th>Dateiname</th><th>Slot</th><th>Aktion</th></tr></thead><tbody id="file-list"></tbody></table>
    </div>

    <h3 style="margin-bottom:10px; color:#94a3b8; margin-top:30px; font-size: 12px; text-transform: uppercase;">Live MQTT Log</h3>
    <div id="log">Warte auf Daten...</div>

    <script>
        let lastKnownState = 1; // 1: IDLE, 2: PRINTING, 3: PAUSED
        let lastNozzleTarget = "--";
        let lastBedTarget = "--";
        let availableTrays = [];

        function updateSlotSelectors() {
            const selectors = document.querySelectorAll('select[id$="-slot"], select[id^="s_"]');
            selectors.forEach(sel => {
                const currentVal = sel.value;
                sel.innerHTML = '';
                if (availableTrays.length === 0) {
                    for(let i=0; i<4; i++) sel.innerHTML += `<option value="${i}">Slot ${i+1}</option>`;
                } else {
                    availableTrays.forEach((t, i) => {
                        const colorStyle = t.filament_color ? `style="background:${t.filament_color}; color:${getContrastYIQ(t.filament_color)}"` : '';
                        sel.innerHTML += `<option value="${i}" ${colorStyle}>Slot ${i+1}: ${t.filament_type || 'Empty'}</option>`;
                    });
                }
                if (currentVal) sel.value = currentVal;
            });
        }

        function getContrastYIQ(hexcolor){
            if (!hexcolor || hexcolor === "transparent") return 'white';
            hexcolor = hexcolor.replace("#", "");
            var r = parseInt(hexcolor.substr(0,2),16);
            var g = parseInt(hexcolor.substr(2,2),16);
            var b = parseInt(hexcolor.substr(4,2),16);
            var yiq = ((r*299)+(g*587)+(b*114))/1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        window.electronAPI.onMqttData((data) => {
            const log = document.getElementById('log');
            const d = document.createElement('div');
            d.textContent = `[${new Date().toLocaleTimeString()}] ${data.payload}`;
            log.prepend(d);
            if (log.children.length > 50) log.lastChild.remove();

            try {
                const json = JSON.parse(data.payload);
                if (!json.result) return;
                const r = json.result;

                // --- 1. Machine Status & Sticky Logic ---
                if (r.machine_status) {
                    let s = r.machine_status.status;
                    const p = r.machine_status.progress !== undefined ? r.machine_status.progress : 0;
                    
                    // STICKY LOGIC: Ignoriere IDLE (1), wenn der Fortschritt zwischen 1% und 99% liegt
                    if (s === 1 && p > 0 && p < 100) {
                        s = (lastKnownState === 3) ? 3 : 2; 
                    }
                    lastKnownState = s;

                    const states = {1: "IDLE", 2: "PRINTING", 3: "PAUSED", 4: "ERROR"};
                    const el = document.getElementById('state');
                    el.textContent = states[s] || "IDLE";
                    el.style.color = s === 2 ? 'var(--green)' : (s === 3 ? 'var(--accent)' : '#fff');
                    
                    document.getElementById('percent').textContent = p + "%";
                    document.getElementById('fill').style.width = p + "%";

                    // Buttons nur bei PRINTING oder PAUSED anzeigen
                    document.getElementById('job-controls').style.display = (s === 2 || s === 3) ? 'flex' : 'none';
                }

                // --- 2. Print Details & Time ---
                if (r.print_status) {
                    if (r.print_status.filename) document.getElementById('cur-filename').textContent = r.print_status.filename;
                    if (r.print_status.remaining_time_sec !== undefined) {
                        const mins = Math.floor(r.print_status.remaining_time_sec / 60);
                        document.getElementById('time-left').textContent = mins + " Min. verbleibend";
                    }
                } else if (lastKnownState === 1) {
                    document.getElementById('cur-filename').textContent = "Kein Job";
                    document.getElementById('time-left').textContent = "--:-- verbleibend";
                }

                // --- 3. Temperatures ---
                if (r.extruder) {
                    const t = Math.round(r.extruder.temperature);
                    if (r.extruder.target !== undefined) lastNozzleTarget = Math.round(r.extruder.target);
                    if (!isNaN(t)) document.getElementById('nozzle').textContent = t + "° / " + lastNozzleTarget + "°";
                }
                if (r.heater_bed) {
                    const t = Math.round(r.heater_bed.temperature);
                    if (r.heater_bed.target !== undefined) lastBedTarget = Math.round(r.heater_bed.target);
                    if (!isNaN(t)) document.getElementById('bed').textContent = t + "° / " + lastBedTarget + "°";
                }

                // --- 4. Filament / Canvas Info ---
                if (r.canvas_info && r.canvas_info.canvas_list && r.canvas_info.canvas_list[0]) {
                    const slot = r.canvas_info.active_tray_id;
                    availableTrays = r.canvas_info.canvas_list[0].tray_list || [];
                    updateSlotSelectors();
                    
                    if (slot !== -1 && availableTrays[slot]) {
                        const tray = availableTrays[slot];
                        document.getElementById('filament-text').textContent = `Slot ${slot+1}: ${tray.filament_type}`;
                        document.getElementById('filament-dot').style.backgroundColor = tray.filament_color || '#fff';
                        document.getElementById('filament-info').style.display = 'inline-flex';
                    }
                } else if (lastKnownState === 1) {
                    document.getElementById('filament-info').style.display = 'none';
                }

                if (r.files) renderFiles(r.files);
            } catch (e) {}
        });

        function renderFiles(files) {
            const tbody = document.getElementById('file-list'); tbody.innerHTML = '';
            files.forEach(f => {
                const name = typeof f === 'string' ? f : (f.name || f.filename);
                const tr = document.createElement('tr');
                const slotId = `s_${name.replace(/\W/g,'_')}`;
                tr.innerHTML = `<td><strong>${name}</strong></td><td><select id="${slotId}"></select></td><td><button class="btn btn-green" onclick="window.electronAPI.startPrint('${name}', document.getElementById('${slotId}').value)">Drucken</button></td>`;
                tbody.appendChild(tr);
            });
            updateSlotSelectors();
        }

        async function handleUpload() {
            const path = await window.electronAPI.selectFile();
            if (path) { document.getElementById('upload-status').textContent = "Hochladen..."; window.electronAPI.uploadFile(path); }
        }

        window.electronAPI.onUploadSuccess((fn) => {
            const slot = document.getElementById('upload-slot').value;
            document.getElementById('upload-status').textContent = `Upload ok! Starte Slot ${parseInt(slot)+1}: ${fn}`;
            setTimeout(() => window.electronAPI.startPrint(fn, slot), 1000);
        });
        window.electronAPI.onUploadError((err) => { alert("Upload Fehler: " + err); });
        function applyTemp(type, id) { const v = document.getElementById(id).value; if (v) window.electronAPI.setTemperature(type, v); }
        setTimeout(() => { updateSlotSelectors(); window.electronAPI.requestFiles(); }, 2000);
    </script>
</body>
</html>
